project:
  name: Directa Telegram Trading Lab
  timezone: Europe/Rome
  currency: EUR

run:
  lookback_days: 520
  min_rows_required: 60
  save_reports: true
  send_telegram: true
  dry_run_default: false

data:
  request_timeout_seconds: 6
  process_timeout_seconds: 20
  download_retries: 0

backtest:
  lookback_days: 900
  min_rows_required: 220
  max_new_positions_per_day: 1

market_regime:
  enabled: true
  lookback_days: 360
  min_rows_required: 220
  neutral_score_boost: 5
  risk_off_score_boost: 15
  block_new_positions_when_risk_off: true
  benchmarks:
    - symbol: SWDA.MI
      name: iShares Core MSCI World UCITS ETF
    - symbol: CSSPX.MI
      name: iShares Core S&P 500 UCITS ETF

risk:
  initial_capital: 1000.0
  risk_per_trade: 25.0
  monthly_loss_limit: 100.0
  max_open_positions: 2
  max_trades_per_month: 6
  cooldown_after_stop_days: 5
  max_allocation_per_trade: 500.0
  min_reward_risk: 2.0
  max_holding_days: 45

opportunity:
  enabled: true
  min_decision_score: 62
  ideal_pullback_distance_pct: 2.5
  max_pullback_distance_pct: 4.5
  ideal_breakout_extension_atr: 0.8
  max_breakout_extension_atr: 1.4
  min_risk_pct: 0.8
  max_risk_pct: 8.0
  high_quality_cost_pct: 1.0
  max_cost_pct: 5.0

strategy:
  min_signal_score: 60
  score_base: 50
  enabled:
    trend_pullback: true
    controlled_breakout: true
  rsi_min_pullback: 40
  rsi_max_pullback: 68
  rsi_max_breakout: 75
  breakout_lookback_days: 20
  volume_breakout_multiplier: 1.10
  near_breakout_pct: 1.5
  setup_watch_min_score: 50
  pullback_lookback_days: 8
  atr_stop_multiplier: 1.50
  breakout_atr_stop_multiplier: 2.00
  trailing_atr_multiplier: 2.00

costs:
  broker: Directa
  # Modello indicativo del profilo variabile Italia: 1,9 per mille, minimo 1,50 €, massimo 18 €.
  # Aggiorna questi valori se usi un profilo commissionale diverso.
  variable_rate: 0.0019
  min_commission: 1.50
  max_commission: 18.00

paths:
  database: state/trading_lab.sqlite
  reports_dir: reports
  signals_csv: data/signals_log.csv
